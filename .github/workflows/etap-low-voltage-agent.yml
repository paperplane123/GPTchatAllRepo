name: ETAP Low Voltage Agent CI

on:
  push:
    paths:
      - "projects/etap-low-voltage-agent/**"
      - ".github/workflows/etap-low-voltage-agent.yml"
  pull_request:
    paths:
      - "projects/etap-low-voltage-agent/**"
      - ".github/workflows/etap-low-voltage-agent.yml"

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: projects/etap-low-voltage-agent
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run unit tests
        run: python -m unittest discover -s tests -v
      - name: Run sample workflow
        run: python -m etap_lv.cli demo
